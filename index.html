<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konrad — Running Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Bebas+Neue&display=swap');
:root{--ink:#0a0a0a;--paper:#f5f0e8;--mid:#888;--rule:#ccc;--dim:#e0dbd0;--sel:#d0cbc1;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Courier Prime',monospace;font-size:13px;line-height:1.4;max-width:980px;margin:0 auto;padding:20px 24px;}

.header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid var(--ink);padding-bottom:8px;margin-bottom:14px;}
.header-name{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;line-height:1;}
.header-sub{font-size:10px;color:var(--mid);text-transform:uppercase;letter-spacing:1px;}
.countdown{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;text-align:right;}
.countdown-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--mid);text-align:right;}

.prs{display:grid;grid-template-columns:repeat(4,1fr);border:1.5px solid var(--ink);margin-bottom:14px;}
.pr-cell{padding:6px 10px;border-right:1px solid var(--ink);}
.pr-cell:last-child{border-right:none;}
.pr-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mid);margin-bottom:1px;}
.pr-value{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.pr-note{font-size:9px;color:var(--mid);}

.section-head{font-size:9px;text-transform:uppercase;letter-spacing:3px;color:var(--mid);border-bottom:1px solid var(--rule);padding-bottom:3px;margin-bottom:8px;margin-top:16px;}

.chart-wrap{position:relative;height:100px;width:100%;}

.week-block{border:1.5px solid var(--ink);}
.week-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;padding:5px 12px;border-bottom:1.5px solid var(--ink);background:var(--ink);color:var(--paper);display:flex;justify-content:space-between;align-items:center;}
.week-km{font-size:16px;letter-spacing:1px;}
.week-km span{font-size:11px;opacity:.7;margin-left:4px;}
.week-days{display:grid;grid-template-columns:repeat(7,1fr);}
.day-col{border-right:1px solid var(--rule);cursor:pointer;min-height:72px;transition:background 0.1s;}
.day-col:last-child{border-right:none;}
.day-col:hover{background:var(--dim);}
.day-col.today{background:#ddd8cf;}
.day-col.selected{background:var(--sel);outline:2px solid var(--ink);outline-offset:-2px;}
.day-head{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--mid);padding:3px 6px 2px;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;}
.day-date{font-size:9px;color:var(--ink);font-weight:700;}
.day-body{padding:4px 6px;}
.day-name{font-size:9px;font-weight:700;line-height:1.2;margin-bottom:2px;}
.day-dist{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.5px;}
.day-pace{font-size:8px;color:var(--mid);}
.day-hr{font-size:8px;color:var(--mid);}
.day-off{font-size:9px;color:#ccc;font-style:italic;padding:4px 6px;}
.day-planned{font-size:9px;color:var(--mid);padding:4px 6px;line-height:1.35;}
.day-planned strong{color:var(--ink);font-size:9px;display:block;margin-bottom:1px;}
.day-planned small{font-size:8px;color:#bbb;}
.tag{display:inline-block;font-size:7px;text-transform:uppercase;letter-spacing:.5px;border:1px solid;padding:0 3px;margin-top:2px;}
.tag-good{border-color:var(--ink);color:var(--ink);font-weight:700;}
.tag-ok{border-color:#aaa;color:#aaa;}
.tag-warn{border-color:#555;color:#555;font-weight:700;}
.tag-race{border-color:var(--ink);color:var(--paper);background:var(--ink);font-weight:700;}

/* FULLSCREEN OVERLAY */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--paper);z-index:100;overflow-y:auto;}
.overlay.open{display:block;}
.overlay-inner{max-width:980px;margin:0 auto;padding:28px 32px 48px;}
.overlay-close{position:fixed;top:20px;right:28px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;background:var(--ink);color:var(--paper);border:none;cursor:pointer;padding:6px 14px;z-index:101;}
.overlay-title{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;line-height:1;border-bottom:3px solid var(--ink);padding-bottom:10px;margin-bottom:20px;}
.overlay-date{font-size:11px;color:var(--mid);text-transform:uppercase;letter-spacing:2px;margin-top:4px;}
.overlay-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;}

.stat-block{margin-bottom:20px;}
.stat-block-title{font-size:9px;text-transform:uppercase;letter-spacing:3px;color:var(--mid);border-bottom:1px solid var(--rule);padding-bottom:3px;margin-bottom:8px;}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #e8e3da;font-size:13px;}
.stat-row:last-child{border-bottom:none;}
.stat-label{color:var(--mid);}
.stat-val{font-weight:700;}
.stat-val-big{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;}

.laps-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px;}
.laps-table th{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--mid);text-align:left;padding:3px 8px 3px 0;border-bottom:1px solid var(--rule);font-weight:400;}
.laps-table td{padding:4px 8px 4px 0;border-bottom:1px solid #e8e3da;vertical-align:top;}
.laps-table tr:last-child td{border-bottom:none;}
.lap-key{font-weight:700;}

.feedback-title{font-size:9px;text-transform:uppercase;letter-spacing:3px;color:var(--mid);border-bottom:1px solid var(--rule);padding-bottom:3px;margin-bottom:12px;}
.feedback-text{font-size:14px;line-height:1.75;color:var(--mid);}
.feedback-rule{margin-top:18px;padding-top:14px;border-top:1px solid var(--rule);}
.feedback-rule-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink);margin-bottom:5px;}
.feedback-rule-body{font-size:12px;color:var(--mid);line-height:1.6;}

.pace-ref{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--rule);}
.pace-cell{padding:6px 8px;border-right:1px solid var(--rule);}
.pace-cell:last-child{border-right:none;}
.pace-type{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--mid);margin-bottom:1px;}
.pace-val{font-family:'Bebas Neue',sans-serif;font-size:15px;}

.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.note-row{border-left:3px solid var(--ink);padding:4px 8px;}
.note-title{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:2px;}
.note-body{font-size:10px;color:var(--mid);line-height:1.5;}

.footer{margin-top:14px;padding-top:6px;border-top:1px solid var(--rule);font-size:9px;color:var(--mid);display:flex;justify-content:space-between;text-transform:uppercase;letter-spacing:1px;}

/* ── Base grid fixes: allow cells to shrink below min-content ────────────── */
.prs{grid-template-columns:repeat(4,minmax(0,1fr));}
.week-days{grid-template-columns:repeat(7,minmax(0,1fr));}
.day-col{min-width:0;}
.day-name{overflow-wrap:break-word;word-break:break-word;}
.pace-ref{grid-template-columns:repeat(5,minmax(0,1fr));}
.week-title{flex-wrap:wrap;gap:2px;}
.week-days-scroll{width:100%;}

/* ── E-ink tablet / narrow viewport (≤ 900px) ───────────────────────────── */
@media(max-width:900px){
  body{padding:14px 16px;}
  .header-name{font-size:30px;}
  .countdown{font-size:40px;}
  .pr-value{font-size:18px;}
}

/* ── Mobile / small tablet (≤ 599px) ────────────────────────────────────── */
@media(max-width:599px){
  body{padding:10px 12px;font-size:12px;}

  /* Header: stack countdown below name */
  .header{flex-direction:column;align-items:flex-start;gap:6px;border-bottom-width:2px;}
  .header-name{font-size:28px;}
  .countdown{text-align:left;font-size:38px;}
  .countdown-label{text-align:left;}

  /* PRs: 2 × 2 */
  .prs{grid-template-columns:repeat(2,1fr);}
  .pr-cell:nth-child(2){border-right:none;}
  .pr-cell:nth-child(3){border-top:1px solid var(--ink);}
  .pr-cell:nth-child(4){border-top:1px solid var(--ink);border-right:none;}

  /* Week days: one row per day instead of horizontal scroll */
  .week-days{display:flex;flex-direction:column;}
  .day-col{display:flex;flex-direction:row;align-items:stretch;border-right:none;border-bottom:1px solid var(--rule);min-height:0;}
  .day-col:last-child{border-bottom:none;}
  .day-head{flex-direction:column;justify-content:center;align-items:flex-start;width:56px;min-width:56px;flex-shrink:0;border-bottom:none;border-right:1px solid var(--rule);padding:8px 7px;}
  .day-date{display:block;margin-top:2px;}
  .day-body{flex:1;padding:6px 8px;}
  .day-off{flex:1;padding:8px 8px;display:flex;align-items:center;}
  .day-planned{flex:1;padding:6px 8px;}
  .day-dist{font-size:15px;}

  /* Overlay: single column */
  .overlay-inner{padding:16px 14px 36px;}
  .overlay-close{top:12px;right:14px;}
  .overlay-title{font-size:28px;}
  .overlay-grid{grid-template-columns:1fr;gap:20px;}

  /* Pace ref: 3 + 2 wrap */
  .pace-ref{grid-template-columns:repeat(3,1fr);}
  .pace-cell:nth-child(3){border-right:none;}
  .pace-cell:nth-child(4){border-top:1px solid var(--rule);}
  .pace-cell:nth-child(5){border-top:1px solid var(--rule);border-right:none;}

  /* Notes: single column */
  .notes-grid{grid-template-columns:1fr;}

  /* Footer: stacked */
  .footer{flex-direction:column;gap:4px;}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-name" id="hName"></div>
    <div class="header-sub"  id="hSub"></div>
  </div>
  <div>
    <div class="countdown"       id="hCountdown"></div>
    <div class="countdown-label" id="hCountdownLabel"></div>
  </div>
</div>

<div class="prs" id="prs"></div>

<div class="section-head">Kilometraż — ostatnie tygodnie</div>
<div class="chart-wrap">
  <canvas id="kmChart" role="img" aria-label="Kilometraż tygodniowy"></canvas>
</div>

<div id="weeksContainer"></div>

<div class="section-head">Tempa referencyjne</div>
<div class="pace-ref" id="paceRef"></div>

<div class="section-head">Zasady i porady</div>
<div class="notes-grid" id="notesGrid"></div>

<div class="footer" id="footer"></div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <button class="overlay-close" onclick="closeOverlay()">✕ ZAMKNIJ</button>
  <div class="overlay-inner">
    <div class="overlay-title" id="oTitle"></div>
    <div class="overlay-date"  id="oDate"></div>
    <div style="margin-top:20px;" class="overlay-grid">
      <div id="oStats"></div>
      <div id="oFeedback"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DAYS_PL = ['Nd','Pn','Wt','Śr','Czw','Pt','So'];

function getDayName(dateStr) {
  return DAYS_PL[new Date(dateStr + 'T12:00:00').getDay()];
}

function getDisplayDate(dateStr) {
  const [, m, d] = dateStr.split('-');
  return `${d}.${m}`;
}

function isToday(dateStr) {
  const t = new Date(), d = new Date(dateStr + 'T12:00:00');
  return t.toDateString() === d.toDateString();
}

function getDaysToRace(raceDateStr) {
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.max(0, Math.round((new Date(raceDateStr + 'T00:00:00') - now) / 86400000));
}

function getWeekDates(startStr) {
  const start = new Date(startStr + 'T12:00:00');
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    return d.toISOString().split('T')[0];
  });
}

async function fetchDay(dateStr) {
  try {
    const r = await fetch(`data/days/${dateStr}.json`);
    return r.ok ? await r.json() : null;
  } catch { return null; }
}

// ── Overlay ──────────────────────────────────────────────────────────────────
let selectedCol = null;

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  if (selectedCol) { selectedCol.classList.remove('selected'); selectedCol = null; }
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

function openOverlay(day) {
  const isRun      = day.type === 'run';
  const isPlanned  = day.type === 'planned';
  const title      = isRun ? day.name : (day.planned || 'OFF');
  const dateLabel  = day.displayDate + (day.isToday ? ' — DZIŚ' : '');

  document.getElementById('oTitle').textContent = title;
  document.getElementById('oDate').textContent  = dateLabel;

  // Stats panel
  let sHtml = '';
  if (isRun && day.stats) {
    sHtml += `<div class="stat-block"><div class="stat-block-title">Dane aktywności</div>`;
    day.stats.forEach(([l, v]) => {
      sHtml += `<div class="stat-row"><span class="stat-label">${l}</span><span class="stat-val">${v}</span></div>`;
    });
    sHtml += `</div>`;
  }
  if (isPlanned) {
    sHtml += `<div class="stat-block"><div class="stat-block-title">Plan</div>`;
    sHtml += `<div class="stat-row"><span class="stat-label">Trening</span><span class="stat-val">${day.planned}</span></div>`;
    if (day.detail) day.detail.split(' · ').forEach(d => {
      sHtml += `<div class="stat-row"><span class="stat-label"></span><span class="stat-val">${d}</span></div>`;
    });
    sHtml += `</div>`;
  }
  if (isRun && day.laps && day.laps.length > 0) {
    sHtml += `<div class="stat-block"><div class="stat-block-title">Splity</div>`;
    sHtml += `<table class="laps-table"><thead><tr><th>Odcinek</th><th>Tempo</th><th>HR</th><th>Notatka</th></tr></thead><tbody>`;
    day.laps.forEach(l => {
      const cls = (l.note && (l.note.includes('MP') || l.note.includes('Interwał') || l.note.includes('finisz'))) ? 'lap-key' : '';
      sHtml += `<tr><td class="${cls}">${l.n}</td><td class="${cls}">${l.pace}</td><td>${l.hr}</td><td style="color:var(--mid);font-size:10px">${l.note || ''}</td></tr>`;
    });
    sHtml += `</tbody></table></div>`;
  }
  document.getElementById('oStats').innerHTML = sHtml;

  // Feedback panel
  let fHtml = '';
  if (day.feedback) {
    fHtml += `<div class="feedback-title">Feedback trenera</div><div class="feedback-text">${day.feedback}</div>`;
    (day.rules || []).forEach(r => {
      fHtml += `<div class="feedback-rule"><div class="feedback-rule-title">${r.t}</div><div class="feedback-rule-body">${r.b}</div></div>`;
    });
  } else if (isPlanned) {
    fHtml += `<div class="feedback-title">Wskazówki</div><div class="feedback-text">Zaplanowany trening. Wykonaj i wgraj dane ze Stravy — ocenię po fakcie.</div>`;
  } else {
    fHtml += `<div class="feedback-title">Dzień odpoczynku</div><div class="feedback-text">OFF. Nogi na górze, sen priorytetem. Nie kompensuj.</div>`;
  }
  document.getElementById('oFeedback').innerHTML = fHtml;

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

// ── Day column builder ────────────────────────────────────────────────────────
function buildDayCol(dateStr, dayData) {
  const col         = document.createElement('div');
  const today       = isToday(dateStr);
  col.className     = 'day-col' + (today ? ' today' : '');

  const dayName     = getDayName(dateStr);
  const displayDate = getDisplayDate(dateStr);

  const head        = document.createElement('div');
  head.className    = 'day-head';
  head.innerHTML    = `<span>${dayName}</span><span class="day-date">${displayDate}</span>`;
  col.appendChild(head);

  if (dayData && dayData.type === 'run') {
    const body     = document.createElement('div');
    body.className = 'day-body';
    const tagHtml  = dayData.tag ? `<div><span class="tag tag-${dayData.tag}">${dayData.tagLabel}</span></div>` : '';
    body.innerHTML = `<div class="day-name">${dayData.name}</div><div class="day-dist">${dayData.dist} km</div><div class="day-pace">${dayData.pace}/km</div><div class="day-hr">${dayData.hr ? 'HR ' + dayData.hr : ''}</div>${tagHtml}`;
    col.appendChild(body);
  } else if (dayData && dayData.type === 'planned') {
    const body     = document.createElement('div');
    body.className = 'day-planned';
    body.innerHTML = `<strong>${dayData.planned}</strong>` + (dayData.detail ? `<small>${dayData.detail}</small>` : '');
    col.appendChild(body);
  } else {
    const body       = document.createElement('div');
    body.className   = 'day-off';
    body.textContent = 'OFF';
    col.appendChild(body);
  }

  const enriched = Object.assign({}, dayData || {type: 'rest'}, {displayDate, dayName, dateStr, isToday: today});
  col.addEventListener('click', () => {
    if (selectedCol) selectedCol.classList.remove('selected');
    col.classList.add('selected');
    selectedCol = col;
    openOverlay(enriched);
  });

  return col;
}

// ── Week renderer ─────────────────────────────────────────────────────────────
async function renderWeek(weekDef, container) {
  const section  = document.createElement('div');

  const sHead    = document.createElement('div');
  sHead.className   = 'section-head';
  sHead.textContent = weekDef.sectionTitle;
  section.appendChild(sHead);

  const block    = document.createElement('div');
  block.className   = 'week-block';

  const titleEl  = document.createElement('div');
  titleEl.className = 'week-title';
  // Placeholder — will be updated once day files are fetched
  titleEl.innerHTML = `<span>${weekDef.displayLabel}</span><span class="week-km" id="wkm-${weekDef.start}">${weekDef.kmText || '…'}</span>`;
  block.appendChild(titleEl);

  const daysDiv   = document.createElement('div');
  daysDiv.className = 'week-days';
  const scrollWrap  = document.createElement('div');
  scrollWrap.className = 'week-days-scroll';
  scrollWrap.appendChild(daysDiv);
  block.appendChild(scrollWrap);
  section.appendChild(block);
  container.appendChild(section);   // append early so header is visible while days load

  const dates      = getWeekDates(weekDef.start);
  const dayDataArr = await Promise.all(dates.map(fetchDay));

  // ── Auto-compute km from actual run entries (past days only) ──────────────
  const todayStr  = new Date().toISOString().split('T')[0];
  const weekEnd   = dates[6];
  let   totalKm   = 0;
  let   hasRuns   = false;
  dayDataArr.forEach((d, i) => {
    if (d && d.type === 'run' && d.dist && dates[i] <= todayStr) {
      totalKm += d.dist;
      hasRuns  = true;
    }
  });
  if (hasRuns) {
    const isPartial = weekEnd > todayStr;
    const kmStr     = totalKm.toFixed(1).replace('.', ',') + ' km';
    const subHtml   = isPartial && weekDef.kmSubText ? `<span>${weekDef.kmSubText}</span>` : '';
    const el        = document.getElementById(`wkm-${weekDef.start}`);
    if (el) el.innerHTML = kmStr + subHtml;
  }

  dates.forEach((dateStr, i) => daysDiv.appendChild(buildDayCol(dateStr, dayDataArr[i])));
}

// ── Bootstrap ────────────────────────────────────────────────────────────────
async function init() {
  const [config, manifest] = await Promise.all([
    fetch('data/config.json').then(r => r.json()),
    fetch('data/manifest.json').then(r => r.json()),
  ]);

  // Header
  document.getElementById('hName').textContent         = config.athlete;
  document.getElementById('hSub').textContent          = config.subtitle;
  document.getElementById('hCountdown').textContent    = getDaysToRace(config.raceDate);
  document.getElementById('hCountdownLabel').textContent = `dni do startu · ${config.raceDateLabel}`;

  // PRs
  const prsEl = document.getElementById('prs');
  config.prs.forEach(pr => {
    prsEl.innerHTML += `<div class="pr-cell"><div class="pr-label">${pr.label}</div><div class="pr-value">${pr.value}</div><div class="pr-note">${pr.note}</div></div>`;
  });

  // Chart
  const kmData = manifest.chartWeeks;
  new Chart(document.getElementById('kmChart'), {
    type: 'bar',
    data: {
      labels:   kmData.map(d => d.label),
      datasets: [{
        data:            kmData.map(d => d.km),
        backgroundColor: kmData.map(d => d.partial ? '#ccc' : '#0a0a0a'),
        borderColor:     kmData.map(d => d.partial ? '#aaa' : '#0a0a0a'),
        borderWidth: 1,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {display: false},
        tooltip: {callbacks: {label: ctx => ctx.parsed.y.toFixed(1) + ' km' + (kmData[ctx.dataIndex].partial ? ' (w toku)' : '')}}
      },
      scales: {
        x: {ticks: {font: {size: 9, family: 'Courier Prime'}, maxRotation: 35, color: '#888', autoSkip: false}, grid: {display: false}},
        y: {min: 0, max: 90, ticks: {font: {size: 9}, stepSize: 30, color: '#888'}, grid: {color: '#e8e3da'}}
      }
    }
  });

  // Weeks (sequential so order is preserved and each header appears before its days load)
  const weeksContainer = document.getElementById('weeksContainer');
  for (const week of manifest.displayWeeks) {
    await renderWeek(week, weeksContainer);
  }

  // Reference paces
  const paceRef = document.getElementById('paceRef');
  config.paces.forEach(p => {
    paceRef.innerHTML += `<div class="pace-cell"><div class="pace-type">${p.type}</div><div class="pace-val">${p.val}</div></div>`;
  });

  // Notes
  const notesGrid = document.getElementById('notesGrid');
  config.notes.forEach(n => {
    notesGrid.innerHTML += `<div class="note-row"><div class="note-title">${n.title}</div><div class="note-body">${n.body}</div></div>`;
  });

  // Footer
  document.getElementById('footer').innerHTML =
    `<span>Aktualizacja: ${manifest.lastUpdated}</span><span>${config.footerNote}</span><span>${config.coTrainer}</span>`;
}

init();
</script>
